name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.21', 'stable']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Build
        run: go build -v ./...
      - name: Test
        run: go test -v -count=1 -covermode=count -coverprofile=coverage.out ./...
      - name: Send to Coveralls
        if: matrix.go-version == 'stable'
        uses: coverallsapp/github-action@v2
        with:
          file: coverage.out
